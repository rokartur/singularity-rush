<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Singularity Rush</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>
  <div id="crt-overlay"></div>

  <div id="game-wrapper">
    <!-- Station UI (meta layer) -->
    <div id="station-wrapper"></div>

    <!-- Run area (expedition gameplay) -->
    <div id="game-area">
      <div id="run-top-bar">
        <div class="stat">
          <span class="stat-label">LVL</span>
          <span class="stat-value green glow" id="ui-level">1</span>
        </div>
        <div id="xp-bar-container"><div id="ui-xp-fill"></div></div>
        <div class="stat">
          <span class="stat-label">HP</span>
          <div id="hp-bar-container" style="position:relative;">
            <div id="ui-hp-fill"></div>
            <div id="ui-shield-fill"></div>
            <span id="ui-hp-text" style="position:relative; z-index:1;">100/100</span>
          </div>
        </div>
        <div class="stat sector-stat">
          <span class="stat-label">Sector</span>
          <span class="stat-value blue" id="ui-galaxy">1</span>
          <span class="sector-name" id="ui-galaxy-name">SECTOR 1</span>
        </div>
      </div>

      <div id="run-canvas-wrap">
        <canvas id="game-canvas"></canvas>

        <div id="expedition-timer" style="display:none;">
          <span id="expedition-time" class="expedition-time-text">15s</span>
        </div>

        <div id="boss-progress">
          <div id="boss-progress-bar"><div id="boss-progress-fill"></div></div>
          <span id="boss-progress-text">0%</span>
        </div>

        <div id="boss-bar">
          <div style="font-size:11px; color:var(--station-danger); font-weight:bold;" id="boss-name">BOSS</div>
          <div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>
          <span id="boss-hp-text"></span>
        </div>

        <div id="combo-display">
          <div id="ui-combo-count"></div>
          <div id="ui-combo-mult"></div>
          <div id="combo-bar-wrap"><div id="ui-combo-bar"></div></div>
        </div>
      </div>
    </div>

    <!-- Run Summary Overlay -->
    <div class="overlay-panel" id="run-summary">
      <div class="panel-content">
        <div class="panel-title">RUN COMPLETE</div>
        <div id="run-summary-content"></div>
        <button class="continue-btn" onclick="window.station.returnToStation()">RETURN TO STATION</button>
      </div>
    </div>

    <!-- Pause Overlay -->
    <div id="pause-overlay">
      <div class="panel-title glow" style="color: var(--station-accent);">PAUSED</div>
      <div style="color:var(--station-text-dim); font-size:14px;">Press ESC to resume</div>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel">
      <div class="panel-content">
        <div class="panel-title">SETTINGS</div>
        <div class="settings-row">
          <span class="settings-label">Export Save</span>
          <button class="settings-btn" onclick="window.station.exportSave()">Export</button>
        </div>
        <textarea class="export-area" id="export-textarea" readonly style="display:none;"></textarea>
        <div class="settings-row">
          <span class="settings-label">Import Save</span>
          <button class="settings-btn" onclick="window.station.showImport()">Import</button>
        </div>
        <textarea class="export-area" id="import-textarea" placeholder="Paste save here..." style="display:none;"></textarea>
        <div class="settings-row" id="import-confirm-row" style="display:none;">
          <span></span>
          <button class="settings-btn" style="border-color:var(--station-success); color:var(--station-success);" onclick="window.station.importSave()">Confirm Import</button>
        </div>
        <div class="settings-row">
          <span class="settings-label">Reset All</span>
          <button class="settings-btn" style="border-color:var(--station-danger); color:var(--station-danger);" onclick="window.station.resetGame()">Reset</button>
        </div>
        <div class="settings-row" style="margin-top:12px;">
          <span></span>
          <button class="settings-btn" onclick="window.station.hideSettings()">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script defer src="js/app.bundle.js"></script>
</body>
</html>
